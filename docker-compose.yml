services:
  sim-ssh:
    build: .
    container_name: sim-server
    ports:
      - "2222:22"
    environment:
      - SIM_PASSWORD=${SIM_PASSWORD:-dragons!!1!}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - SYS_CHROOT
      - AUDIT_WRITE
    volumes:
      - ./shared:/opt/shared:ro
    networks:
      - sim-net

networks:
  sim-net:
    internal: false
